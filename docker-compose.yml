version: '3.9'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: techapp_db
    environment:
      POSTGRES_USER: techapp
      POSTGRES_PASSWORD: techapp_secret
      POSTGRES_DB: techapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: techapp_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: techapp_api
    ports:
      - "8080:8080"
      - "8081:8081"
    env_file:
      - .env.example
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: techapp_admin
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8080
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
