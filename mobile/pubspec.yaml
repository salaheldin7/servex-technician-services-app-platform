name: tech_app
description: Home Services Platform - Single role-based mobile app

publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Navigation
  go_router: ^17.1.0

  # Networking
  dio: ^5.4.1
  web_socket_channel: ^3.0.3

  # Storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.2.2

  # Maps & Location
  google_maps_flutter: ^2.6.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  lottie: ^3.1.0
  intl: ^0.20.2

  # Utilities
  json_annotation: ^4.8.1
  freezed_annotation: ^3.1.0
  equatable: ^2.0.5
  uuid: ^4.3.3
  url_launcher: ^6.2.4
  image_picker: ^1.0.7
  file_picker: ^10.3.10
  permission_handler: ^12.0.1

  # Firebase
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  camera: ^0.11.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  freezed: ^3.2.3
  riverpod_generator: ^4.0.0+1

flutter:
  uses-material-design: true
